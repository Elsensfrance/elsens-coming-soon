<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elsens — Arrive bientôt</title>
  <meta
    name="description"
    content="Elsens arrive bientôt. Une nouvelle approche du soin pour les peaux sensibles."
  />
  <style>
    @font-face {
  font-family: 'Conso';
  src: url('Conso-Regular.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
}

@font-face {
  font-family: 'Red Hat Display';
  src: url('RedHatDisplay-Regular.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}
    :root {
      --navy: #1F202C;
      --beige: #E9DCCC;
      --mauve: #96616B;
      --ivory: #FAF4EE;
      --white: #FFFEFA;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Red Hat Display', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(233, 220, 204, 0.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(150, 97, 107, 0.10), transparent 30%),
        var(--white);
      color: var(--navy);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 1180px;
      background: rgba(255, 254, 250, 0.82);
      border: 1px solid rgba(31, 32, 44, 0.06);
      border-radius: 28px;
      box-shadow: 0 18px 60px rgba(31, 32, 44, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.02fr 0.98fr;
      min-height: 720px;
    }

    .content {
      padding: 56px 56px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
    }

    .logo-wrap {
      margin-bottom: 6px;
    }

    .logo {
      width: 290px;
      max-width: 72%;
      height: auto;
      display: block;
    }

    .eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--mauve);
      margin: 0 0 8px 0;
      font-weight: 600;
    }

    h1 {
      font-family: 'Conso', sans-serif;
      font-size: clamp(2.2rem, 4vw, 4.5rem);
      line-height: 0.98;
      letter-spacing: -0.03em;
      margin: 0;
      font-weight: 600;
      white-space: nowrap;
    }

    .intro {
      max-width: 560px;
      font-size: 1.1rem;
      line-height: 1.75;
      color: rgba(31, 32, 44, 0.78);
      margin: 0;
    }

    .intro p {
      margin: 0 0 8px 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 4px;
    }

    .button,
    .button-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.96rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .button {
      background: var(--navy);
      color: var(--white);
      box-shadow: 0 10px 30px rgba(31, 32, 44, 0.14);
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button-secondary {
      border: 1px solid rgba(31, 32, 44, 0.12);
      color: var(--navy);
      background: rgba(255, 255, 255, 0.55);
    }

    .button-secondary:hover {
      background: rgba(250, 244, 238, 0.9);
      transform: translateY(-1px);
    }

    .contact {
      margin-top: 6px;
      font-size: 0.98rem;
      color: rgba(31, 32, 44, 0.72);
      line-height: 1.7;
    }

    .contact a {
      color: var(--navy);
      text-decoration: none;
      border-bottom: 1px solid rgba(31, 32, 44, 0.18);
      transition: border-color 0.2s ease, opacity 0.2s ease;
    }

    .contact a:hover {
      border-color: var(--mauve);
      opacity: 0.9;
    }

    .note {
      margin-top: 12px;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(150, 97, 107, 0.78);
    }

    .visual {
      position: relative;
      min-height: 420px;
      background: linear-gradient(180deg, rgba(250, 244, 238, 0.35), rgba(233, 220, 204, 0.18));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .image-frame {
      width: 100%;
      max-width: 560px;
      aspect-ratio: 1 / 1;
      border-radius: 26px;
      overflow: hidden;
      background: #f4efe8;
      box-shadow:
        0 24px 60px rgba(31, 32, 44, 0.10),
        inset 0 0 0 1px rgba(255, 255, 255, 0.35);
    }

    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .signature {
      position: absolute;
      bottom: 22px;
      right: 28px;
      font-size: 0.78rem;
      color: rgba(31, 32, 44, 0.32);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .content {
        order: 2;
        padding: 40px 28px 36px;
        text-align: center;
        align-items: center;
      }

      .intro {
        max-width: 640px;
      }

      .visual {
        order: 1;
        padding: 22px 22px 0;
        min-height: auto;
      }

      .image-frame {
        max-width: 680px;
        border-radius: 24px;
      }

      .logo {
        max-width: 240px;
        width: 58%;
        margin: 0 auto;
      }

      .signature {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 14px;
      }

      .card {
        border-radius: 22px;
      }

      .content {
        padding: 28px 20px 28px;
        gap: 22px;
      }

      .logo {
        width: 210px;
        max-width: 78%;
      }

      h1 {
        font-size: 2.2rem;
      }

      .intro {
        font-size: 1rem;
        line-height: 1.7;
      }

      .actions {
        width: 100%;
        flex-direction: column;
      }

      .button,
      .button-secondary {
        width: 100%;
      }

      .visual {
        padding: 14px 14px 0;
      }

      .image-frame {
        border-radius: 18px;
      }
    }
    @media (max-width: 640px) {
  h1 {
    white-space: normal;
  }
}
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="grid">
        <div class="content">
          <div class="logo-wrap">
            <img src="logo.png" alt="Elsens France" class="logo" />
          </div>

          <div>
            <p class="eyebrow">Bientôt en ligne</p>
            <h1>Elsens arrive bientôt</h1>
          </div>

          <div class="intro">
            <p>Une nouvelle approche du soin pour les peaux sensibles.</p>
          </div>

          <div class="actions">
            <a
              class="button"
              href="https://www.instagram.com/elsensfrance/"
              target="_blank"
              rel="noopener noreferrer"
            >
              Suivre sur Instagram
            </a>

            <a
              class="button-secondary"
              href="mailto:contact@elsens.fr"
            >
              Nous contacter
            </a>
          </div>

          <div class="contact">
            <a href="mailto:contact@elsens.fr">contact@elsens.fr</a>
          </div>

          <div class="note">Site en préparation</div>
        </div>

        <div class="visual">
          <div class="image-frame">
            <img src="produit.jpg" alt="Produit Elsens dans une mousse délicate" />
          </div>
          <div class="signature">Elsens France</div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
